name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml-service/**"
      - "deploy/azure/**"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:

concurrency:
  group: deploy-azure-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      OIDC_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      OIDC_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      OIDC_SUBSCRIPTION_ID: ${{ secrets.AZ_SUBSCRIPTION_ID }}
      SP_CREDENTIALS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        if: env.OIDC_CLIENT_ID != '' && env.OIDC_TENANT_ID != '' && env.OIDC_SUBSCRIPTION_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}

      - name: Azure Login (Service Principal JSON)
        if: (env.OIDC_CLIENT_ID == '' || env.OIDC_TENANT_ID == '' || env.OIDC_SUBSCRIPTION_ID == '') && env.SP_CREDENTIALS_JSON != ''
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Azure auth inputs
        if: (env.OIDC_CLIENT_ID == '' || env.OIDC_TENANT_ID == '' || env.OIDC_SUBSCRIPTION_ID == '') && env.SP_CREDENTIALS_JSON == ''
        run: |
          echo "Missing Azure authentication secrets."
          echo "Set either OIDC secrets (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZ_SUBSCRIPTION_ID)"
          echo "or AZURE_CREDENTIALS (service principal JSON)."
          exit 1

      - name: Verify toolchain
        run: |
          az version
          docker --version

      - name: Validate deployment variables
        env:
          AZ_SUBSCRIPTION_ID: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          AZ_LOCATION: ${{ secrets.AZ_LOCATION }}
          AZ_RESOURCE_GROUP: ${{ secrets.AZ_RESOURCE_GROUP }}
          AZ_ACR_NAME: ${{ secrets.AZ_ACR_NAME }}
          AZ_CONTAINERAPPS_ENV: ${{ secrets.AZ_CONTAINERAPPS_ENV }}
          AZ_DB_SERVER: ${{ secrets.AZ_DB_SERVER }}
          AZ_DB_ADMIN_USER: ${{ secrets.AZ_DB_ADMIN_USER }}
          AZ_DB_ADMIN_PASSWORD: ${{ secrets.AZ_DB_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          missing=()

          [[ -z "${AZ_SUBSCRIPTION_ID}" && -z "${OIDC_SUBSCRIPTION_ID}" ]] && missing+=("AZ_SUBSCRIPTION_ID (or OIDC subscription-id)")
          [[ -z "${AZ_ACR_NAME}" ]] && missing+=("AZ_ACR_NAME")
          [[ -z "${AZ_DB_SERVER}" ]] && missing+=("AZ_DB_SERVER")
          [[ -z "${AZ_DB_ADMIN_USER}" ]] && missing+=("AZ_DB_ADMIN_USER")
          [[ -z "${AZ_DB_ADMIN_PASSWORD}" ]] && missing+=("AZ_DB_ADMIN_PASSWORD")
          [[ -z "${JWT_SECRET}" ]] && missing+=("JWT_SECRET")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required deployment secrets/variables:"
            for key in "${missing[@]}"; do echo " - $key"; done
            echo "Set these in Repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Deploy
        env:
          AZ_SUBSCRIPTION_ID: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          AZ_LOCATION: ${{ secrets.AZ_LOCATION || 'centralindia' }}
          AZ_RESOURCE_GROUP: ${{ secrets.AZ_RESOURCE_GROUP || 'rg-fintrack-prod' }}
          AZ_ACR_NAME: ${{ secrets.AZ_ACR_NAME }}
          AZ_CONTAINERAPPS_ENV: ${{ secrets.AZ_CONTAINERAPPS_ENV || 'cae-fintrack-prod' }}
          AZ_DB_SERVER: ${{ secrets.AZ_DB_SERVER }}
          AZ_DB_ADMIN_USER: ${{ secrets.AZ_DB_ADMIN_USER }}
          AZ_DB_ADMIN_PASSWORD: ${{ secrets.AZ_DB_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          AZ_DB_NAME: ${{ secrets.AZ_DB_NAME || 'expense_tracker' }}
          BACKEND_APP_NAME: ${{ secrets.BACKEND_APP_NAME || 'fintrack-backend' }}
          FRONTEND_APP_NAME: ${{ secrets.FRONTEND_APP_NAME || 'fintrack-frontend' }}
          ML_APP_NAME: ${{ secrets.ML_APP_NAME || 'fintrack-ml-service' }}
        run: |
          set -euo pipefail
          export AZ_SUBSCRIPTION_ID="${AZ_SUBSCRIPTION_ID:-$OIDC_SUBSCRIPTION_ID}"
          chmod +x deploy/azure/deploy.sh
          ./deploy/azure/deploy.sh
