name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: expense_tracker
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d expense_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/expense_tracker
      JWT_SECRET: ci-secret
      ML_BASE_URL: http://127.0.0.1:8000
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Initialize DB schema
        working-directory: backend
        run: npm run db:init

      - name: Run backend tests
        working-directory: backend
        run: npm run test:ci

      - name: Run backend perf smoke
        working-directory: backend
        env:
          PERF_P95_MAX_MS: 300
        run: npm run perf:smoke

      - name: Run DB query plan smoke
        working-directory: backend
        env:
          EXPLAIN_SAMPLE_SIZE: 400
          EXPLAIN_MAX_EXEC_MS: 25
        run: npm run db:explain

      - name: Print perf smoke summary
        run: |
          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('backend/test-results/perf-smoke.json', 'utf8'));
          const lines = [
            '## Backend Perf Smoke',
            '',
            '| Metric | Value |',
            '|---|---|',
            '| Status | ' + report.status + ' |',
            '| Requests | ' + report.requests + ' |',
            '| Avg (ms) | ' + report.avgMs + ' |',
            '| P95 (ms) | ' + report.p95Ms + ' |',
            '| Threshold (ms) | ' + report.thresholdMs + ' |',
            '| Alerts | ' + ((report.alerts || []).length) + ' |'
          ];

          const summary = lines.join('\n');
          console.log(summary);

          if (process.env.GITHUB_STEP_SUMMARY) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary + '\n');
          }
          NODE

      - name: Print DB query plan summary
        run: |
          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('backend/test-results/query-plans.json', 'utf8'));
          const lines = [
            '## DB Query Plan Smoke',
            '',
            '| Metric | Value |',
            '|---|---|',
            '| Status | ' + report.status + ' |',
            '| Probes | ' + (report.probes || []).length + ' |',
            '| Threshold (ms) | ' + report.thresholdMs + ' |',
            '| Failures | ' + (report.failures || []).length + ' |'
          ];

          const summary = lines.join('\n');
          console.log(summary);

          if (process.env.GITHUB_STEP_SUMMARY) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary + '\n');
          }
          NODE

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            backend/test-results/vitest-junit.xml
            backend/test-results/perf-smoke.json
            backend/test-results/query-plans.json
            backend/coverage/**

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: backend-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: expense_tracker
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d expense_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/expense_tracker
      JWT_SECRET: ci-secret
      ML_BASE_URL: http://127.0.0.1:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare backend database
        working-directory: backend
        run: |
          npm run db:init
          npm run prisma:seed

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend e2e tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload frontend e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-artifacts
          path: |
            frontend/test-results/playwright-junit.xml
            frontend/playwright-report/**

  ml-evaluation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ML dependencies
        working-directory: ml-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ML evaluation
        working-directory: ml-service
        run: python evaluate.py

      - name: Run ML evaluation (consecutive pass check)
        working-directory: ml-service
        run: python evaluate.py

      - name: Upload ML evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: ml-evaluation-report
          path: ml-service/evaluation_report.json
